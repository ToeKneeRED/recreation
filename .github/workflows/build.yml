name: build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive  # third_party/equilibrium
      - name: zetanet
        uses: actions/checkout@v4
        with:
          repository: Force67/zetanet
          ref: develop
          path: zetanet
          submodules: recursive
      - name: libultragui
        uses: actions/checkout@v4
        with:
          repository: Force67/libultragui
          path: libultragui
          submodules: recursive
      - name: rx
        uses: actions/checkout@v4
        with:
          repository: Force67/rx
          path: rx
          submodules: recursive
      - name: kinema
        uses: actions/checkout@v4
        with:
          repository: Force67/kinema
          path: kinema
      - name: deps
        run: |
          scripts/setup-linux.sh --system
          scripts/setup-linux.sh --dxc
      - name: third-party deps
        run: |
          bash tools/get_nanobuf.sh
          bash rx/tools/get_fidelityfx.sh
          bash rx/tools/get_dlss.sh
          bash rx/tools/get_nrd.sh
          bash rx/tools/get_jolt.sh
      - name: configure
        run: >
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DRECREATION_FETCH_SDL3=ON -DRECREATION_MIMALLOC=ON          -DRECREATION_ZETANET_DIR=${{ github.workspace }}/zetanet
          -DRECREATION_LIBULTRAGUI_DIR=${{ github.workspace }}/libultragui
          -DRECREATION_RX_DIR=${{ github.workspace }}/rx
      - name: build
        run: cmake --build build
      - uses: actions/upload-artifact@v4
        with:
          name: recreation-linux-x64
          path: |
            build/runtime/recreation
            build/tools/esminfo/esminfo

  # Boots the renderer headlessly on lavapipe and captures the golden scenes
  # (tests/golden). No reference set is pinned for the runner's mesa yet, so
  # this is smoke-level: it fails on crashes, missing captures or degenerate
  # frames, and uploads the captures for inspection / later promotion with
  # `golden.py --update`. continue-on-error until the runner stack proves
  # stable; flip it off once a ci reference set is checked in.
  golden-smoke:
    runs-on: ubuntu-24.04
    needs: linux
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: recreation-linux-x64
          path: build
      - name: deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            mesa-vulkan-drivers libvulkan1 xvfb python3-pil python3-numpy
          chmod +x build/runtime/recreation
      - name: golden smoke
        env:
          VK_DRIVER_FILES: /usr/share/vulkan/icd.d/lvp_icd.x86_64.json
          SDL_AUDIODRIVER: dummy
          LP_NUM_THREADS: "1"
        run: >
          xvfb-run -a -s "-screen 0 1280x720x24"
          python3 tests/golden/golden.py --binary build/runtime/recreation
          --profile loose --timeout 600
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: golden-captures
          path: build/golden

  linux-arm:
    runs-on: ubuntu-24.04-arm
    env:
      # Microsoft ships no aarch64 Linux dxc, so it is built from this pinned
      # source tag below and cached. DLSS is x86_64-only and stays off.
      DXC_TAG: v1.9.2602.24
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive  # third_party/equilibrium
      - name: zetanet
        uses: actions/checkout@v4
        with:
          repository: Force67/zetanet
          ref: develop
          path: zetanet
          submodules: recursive
      - name: libultragui
        uses: actions/checkout@v4
        with:
          repository: Force67/libultragui
          path: libultragui
          submodules: recursive
      - name: rx
        uses: actions/checkout@v4
        with:
          repository: Force67/rx
          path: rx
          submodules: recursive
      - name: kinema
        uses: actions/checkout@v4
        with:
          repository: Force67/kinema
          path: kinema
      - name: deps
        run: scripts/setup-linux.sh --system
      - name: dxc cache
        id: dxc-cache
        uses: actions/cache@v4
        with:
          path: dxc-install
          key: dxc-${{ env.DXC_TAG }}-arm64
      - name: build dxc
        if: steps.dxc-cache.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch "$DXC_TAG" --recurse-submodules --shallow-submodules \
            https://github.com/microsoft/DirectXShaderCompiler dxc-src
          cmake -B dxc-build -G Ninja dxc-src \
            -C dxc-src/cmake/caches/PredefinedParams.cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DENABLE_SPIRV_CODEGEN=ON \
            -DSPIRV_BUILD_TESTS=OFF \
            -DLLVM_ENABLE_ASSERTIONS=OFF \
            -DHLSL_DISABLE_SOURCE_GENERATION=ON
          cmake --build dxc-build --target dxc
          mkdir -p dxc-install/bin dxc-install/lib
          cp dxc-build/bin/dxc dxc-install/bin/
          cp dxc-build/lib/libdxcompiler.so* dxc-install/lib/
      - name: install dxc
        run: |
          sudo cp dxc-install/bin/dxc /usr/local/bin/
          sudo cp -a dxc-install/lib/libdxcompiler.so* /usr/local/lib/
          sudo chmod +x /usr/local/bin/dxc
          sudo ldconfig
      - name: third-party deps
        run: |
          bash tools/get_nanobuf.sh
          bash rx/tools/get_fidelityfx.sh
          bash rx/tools/get_nrd.sh
          bash rx/tools/get_jolt.sh
      - name: configure
        run: >
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DRECREATION_FETCH_SDL3=ON -DRECREATION_MIMALLOC=ON          -DRECREATION_ZETANET_DIR=${{ github.workspace }}/zetanet
          -DRECREATION_LIBULTRAGUI_DIR=${{ github.workspace }}/libultragui
          -DRECREATION_RX_DIR=${{ github.workspace }}/rx
          -DRECREATION_DLSS=OFF
      - name: build
        run: cmake --build build
      - uses: actions/upload-artifact@v4
        with:
          name: recreation-linux-arm64
          path: |
            build/runtime/recreation
            build/tools/esminfo/esminfo

  windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive  # third_party/equilibrium
      - name: zetanet
        uses: actions/checkout@v4
        with:
          repository: Force67/zetanet
          ref: develop
          path: zetanet
          submodules: recursive
      - name: libultragui
        uses: actions/checkout@v4
        with:
          repository: Force67/libultragui
          path: libultragui
          submodules: recursive
      - name: rx
        uses: actions/checkout@v4
        with:
          repository: Force67/rx
          path: rx
          submodules: recursive
      - name: kinema
        uses: actions/checkout@v4
        with:
          repository: Force67/kinema
          path: kinema
      # Real-time scanning of every .obj/.lib/.exe dominates Windows build time on
      # the hosted runner; exclude the workspace for the duration of the job.
      - name: exclude workspace from Defender
        shell: pwsh
        run: Add-MpPreference -ExclusionPath "${{ github.workspace }}"
      # Persist vcpkg's built binary packages (freetype + harfbuzz) across runs, so
      # `vcpkg install` restores them instead of compiling from source (~7 min).
      # Bump the key suffix if the runner's vcpkg baseline changes and the archives
      # go stale.
      - name: vcpkg binary cache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}\vcpkg-cache
          key: vcpkg-x64-windows-freetype-harfbuzz-v1
      - name: deps (dxc, glslang, freetype, harfbuzz, pkg-config)
        shell: pwsh
        env:
          VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}\vcpkg-cache
        run: |
          New-Item -ItemType Directory -Force -Path $env:VCPKG_DEFAULT_BINARY_CACHE | Out-Null
          ./scripts/setup-windows.ps1 -Dxc
          ./scripts/setup-windows.ps1 -System
      - name: third-party deps
        shell: bash
        run: |
          bash tools/get_nanobuf.sh
          bash rx/tools/get_fidelityfx.sh
          bash rx/tools/get_nrd.sh
          bash rx/tools/get_jolt.sh
      # cl/link for the Ninja generator (the VS generator found MSVC itself; Ninja
      # does not). Runs AFTER the dxc setup: msvc-dev-cmd puts the Windows SDK's
      # DXIL-only dxc on PATH, and setup-windows.ps1 skips its SPIRV dxc download
      # when any dxc is already found.
      - name: msvc dev environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64
      # Put the DirectXShaderCompiler (SPIRV-capable) that setup-windows.ps1
      # installed back ahead of the SDK's dxc, so the engine + NRD shader builds
      # pick the right compiler.
      - name: prefer the SPIRV dxc over the SDK dxc
        shell: pwsh
        run: Add-Content -Path $env:GITHUB_PATH -Value "${{ github.workspace }}\third_party\winbin\dxc\bin\x64"
      - name: configure
        run: >
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DRECREATION_FETCH_SDL3=ON -DRECREATION_MIMALLOC=ON
          -DRECREATION_ZETANET_DIR=${{ github.workspace }}/zetanet
          -DRECREATION_LIBULTRAGUI_DIR=${{ github.workspace }}/libultragui
          -DRECREATION_RX_DIR=${{ github.workspace }}/rx
          -DRECREATION_DLSS=OFF
      - name: build
        run: cmake --build build
      - uses: actions/upload-artifact@v4
        with:
          name: recreation-windows-x64
          path: |
            build/runtime/recreation.exe
            build/runtime/mimalloc.dll
            build/runtime/mimalloc-redirect.dll
            build/tools/esminfo/esminfo.exe

  macos:
    runs-on: macos-latest
    env:
      # Microsoft ships no macOS dxc, so it is built from this pinned source tag
      # and cached. DLSS/FSR3/NRD are off on Apple (MoltenVK), so only Jolt is
      # fetched and no glslang is needed.
      DXC_TAG: v1.9.2602.24
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive  # third_party/equilibrium
      - name: zetanet
        uses: actions/checkout@v4
        with:
          repository: Force67/zetanet
          ref: develop
          path: zetanet
          submodules: recursive
      - name: libultragui
        uses: actions/checkout@v4
        with:
          repository: Force67/libultragui
          path: libultragui
          submodules: recursive
      - name: rx
        uses: actions/checkout@v4
        with:
          repository: Force67/rx
          path: rx
          submodules: recursive
      - name: kinema
        uses: actions/checkout@v4
        with:
          repository: Force67/kinema
          path: kinema
      - name: deps
        run: scripts/setup-macos.sh --system
      - name: dxc cache restore
        id: dxc-cache
        uses: actions/cache/restore@v4
        with:
          path: dxc-install
          key: dxc-${{ env.DXC_TAG }}-macos-arm64
      - name: build dxc
        if: steps.dxc-cache.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch "$DXC_TAG" --recurse-submodules --shallow-submodules \
            https://github.com/microsoft/DirectXShaderCompiler dxc-src
          cmake -B dxc-build -G Ninja dxc-src \
            -C dxc-src/cmake/caches/PredefinedParams.cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DENABLE_SPIRV_CODEGEN=ON \
            -DSPIRV_BUILD_TESTS=OFF \
            -DLLVM_ENABLE_ASSERTIONS=OFF \
            -DHLSL_DISABLE_SOURCE_GENERATION=ON
          cmake --build dxc-build --target dxc
          mkdir -p dxc-install/bin dxc-install/lib
          cp dxc-build/bin/dxc dxc-install/bin/
          cp dxc-build/lib/libdxcompiler.dylib dxc-install/lib/
      # Save right after the build so dxc is cached even when a later step (the
      # engine build) fails; actions/cache otherwise only saves on job success.
      - name: dxc cache save
        if: steps.dxc-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: dxc-install
          key: dxc-${{ env.DXC_TAG }}-macos-arm64
      - name: install dxc
        run: |
          chmod +x dxc-install/bin/dxc
          echo "$GITHUB_WORKSPACE/dxc-install/bin" >> "$GITHUB_PATH"
          echo "DYLD_FALLBACK_LIBRARY_PATH=$GITHUB_WORKSPACE/dxc-install/lib:$DYLD_FALLBACK_LIBRARY_PATH" >> "$GITHUB_ENV"
      - name: third-party deps
        run: |
          bash tools/get_nanobuf.sh
          bash rx/tools/get_jolt.sh
      - name: configure
        run: >
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DRECREATION_FETCH_SDL3=ON -DRECREATION_MIMALLOC=ON          -DCMAKE_PREFIX_PATH=$(brew --prefix)
          -DRECREATION_ZETANET_DIR=${{ github.workspace }}/zetanet
          -DRECREATION_LIBULTRAGUI_DIR=${{ github.workspace }}/libultragui
          -DRECREATION_RX_DIR=${{ github.workspace }}/rx
      - name: build
        run: cmake --build build
      - uses: actions/upload-artifact@v4
        with:
          name: recreation-macos-arm64
          path: |
            build/runtime/recreation
            build/tools/esminfo/esminfo

  android:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive  # third_party/equilibrium
      - name: zetanet
        uses: actions/checkout@v4
        with:
          repository: Force67/zetanet
          ref: develop
          path: zetanet
          submodules: recursive
      - name: rx
        uses: actions/checkout@v4
        with:
          repository: Force67/rx
          path: rx
          submodules: recursive
      - name: kinema
        uses: actions/checkout@v4
        with:
          repository: Force67/kinema
          path: kinema
      - name: deps
        run: |
          scripts/setup-linux.sh --system --minimal
          scripts/setup-linux.sh --dxc
      - name: nanobuf
        run: bash tools/get_nanobuf.sh
      - name: configure
        run: >
          cmake -B build-android -G Ninja
          -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_LATEST_HOME/build/cmake/android.toolchain.cmake
          -DANDROID_ABI=arm64-v8a -DANDROID_PLATFORM=android-29
          -DCMAKE_BUILD_TYPE=Release -DRECREATION_BUILD_TOOLS=OFF -DRECREATION_MIMALLOC=ON          -DRECREATION_ZETANET_DIR=${{ github.workspace }}/zetanet
          -DRECREATION_RX_DIR=${{ github.workspace }}/rx
      - name: build
        run: cmake --build build-android
      - uses: actions/upload-artifact@v4
        with:
          name: recreation-android-arm64
          path: build-android/runtime/recreation
