name: build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: zetanet
        uses: actions/checkout@v4
        with:
          repository: Force67/zetanet
          ref: develop
          path: zetanet
          submodules: recursive
      - name: libultragui
        uses: actions/checkout@v4
        with:
          repository: Force67/libultragui
          path: libultragui
          submodules: recursive
      - name: deps
        run: |
          scripts/setup-linux.sh --system
          scripts/setup-linux.sh --dxc
      - name: third-party deps
        run: |
          bash tools/get_nanobuf.sh
          bash tools/get_fidelityfx.sh
          bash tools/get_dlss.sh
          bash tools/get_nrd.sh
          bash tools/get_jolt.sh
      - name: configure
        run: >
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DRECREATION_FETCH_SDL3=ON
          -DRECREATION_ZETANET_DIR=${{ github.workspace }}/zetanet
          -DRECREATION_LIBULTRAGUI_DIR=${{ github.workspace }}/libultragui
      - name: build
        run: cmake --build build
      - uses: actions/upload-artifact@v4
        with:
          name: recreation-linux-x64
          path: |
            build/runtime/recreation
            build/tools/esminfo/esminfo

  linux-arm:
    runs-on: ubuntu-24.04-arm
    env:
      # Microsoft ships no aarch64 Linux dxc, so it is built from this pinned
      # source tag below and cached. DLSS is x86_64-only and stays off.
      DXC_TAG: v1.9.2602.24
    steps:
      - uses: actions/checkout@v4
      - name: zetanet
        uses: actions/checkout@v4
        with:
          repository: Force67/zetanet
          ref: develop
          path: zetanet
          submodules: recursive
      - name: libultragui
        uses: actions/checkout@v4
        with:
          repository: Force67/libultragui
          path: libultragui
          submodules: recursive
      - name: deps
        run: scripts/setup-linux.sh --system
      - name: dxc cache
        id: dxc-cache
        uses: actions/cache@v4
        with:
          path: dxc-install
          key: dxc-${{ env.DXC_TAG }}-arm64
      - name: build dxc
        if: steps.dxc-cache.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch "$DXC_TAG" --recurse-submodules --shallow-submodules \
            https://github.com/microsoft/DirectXShaderCompiler dxc-src
          cmake -B dxc-build -G Ninja dxc-src \
            -C dxc-src/cmake/caches/PredefinedParams.cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DENABLE_SPIRV_CODEGEN=ON \
            -DSPIRV_BUILD_TESTS=OFF \
            -DLLVM_ENABLE_ASSERTIONS=OFF \
            -DHLSL_DISABLE_SOURCE_GENERATION=ON
          cmake --build dxc-build --target dxc
          mkdir -p dxc-install/bin dxc-install/lib
          cp dxc-build/bin/dxc dxc-install/bin/
          cp dxc-build/lib/libdxcompiler.so* dxc-install/lib/
      - name: install dxc
        run: |
          sudo cp dxc-install/bin/dxc /usr/local/bin/
          sudo cp -a dxc-install/lib/libdxcompiler.so* /usr/local/lib/
          sudo chmod +x /usr/local/bin/dxc
          sudo ldconfig
      - name: third-party deps
        run: |
          bash tools/get_nanobuf.sh
          bash tools/get_fidelityfx.sh
          bash tools/get_nrd.sh
          bash tools/get_jolt.sh
      - name: configure
        run: >
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DRECREATION_FETCH_SDL3=ON
          -DRECREATION_ZETANET_DIR=${{ github.workspace }}/zetanet
          -DRECREATION_LIBULTRAGUI_DIR=${{ github.workspace }}/libultragui
          -DRECREATION_DLSS=OFF
      - name: build
        run: cmake --build build
      - uses: actions/upload-artifact@v4
        with:
          name: recreation-linux-arm64
          path: |
            build/runtime/recreation
            build/tools/esminfo/esminfo

  windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - name: zetanet
        uses: actions/checkout@v4
        with:
          repository: Force67/zetanet
          ref: develop
          path: zetanet
          submodules: recursive
      - name: libultragui
        uses: actions/checkout@v4
        with:
          repository: Force67/libultragui
          path: libultragui
          submodules: recursive
      - name: deps (dxc, glslang, freetype, harfbuzz, pkg-config)
        shell: pwsh
        run: |
          ./scripts/setup-windows.ps1 -Dxc
          ./scripts/setup-windows.ps1 -System
      - name: third-party deps
        shell: bash
        run: |
          bash tools/get_nanobuf.sh
          bash tools/get_fidelityfx.sh
          bash tools/get_nrd.sh
          bash tools/get_jolt.sh
      - name: configure
        run: >
          cmake -B build -DRECREATION_FETCH_SDL3=ON
          -DRECREATION_ZETANET_DIR=${{ github.workspace }}/zetanet
          -DRECREATION_LIBULTRAGUI_DIR=${{ github.workspace }}/libultragui
          -DRECREATION_DLSS=OFF
      - name: build
        run: cmake --build build --config Release
      - uses: actions/upload-artifact@v4
        with:
          name: recreation-windows-x64
          path: |
            build/runtime/Release/recreation.exe
            build/tools/esminfo/Release/esminfo.exe

  macos:
    runs-on: macos-latest
    env:
      # Microsoft ships no macOS dxc, so it is built from this pinned source tag
      # and cached. DLSS/FSR3/NRD are off on Apple (MoltenVK), so only Jolt is
      # fetched and no glslang is needed.
      DXC_TAG: v1.9.2602.24
    steps:
      - uses: actions/checkout@v4
      - name: zetanet
        uses: actions/checkout@v4
        with:
          repository: Force67/zetanet
          ref: develop
          path: zetanet
          submodules: recursive
      - name: libultragui
        uses: actions/checkout@v4
        with:
          repository: Force67/libultragui
          path: libultragui
          submodules: recursive
      - name: deps
        run: scripts/setup-macos.sh --system
      - name: dxc cache restore
        id: dxc-cache
        uses: actions/cache/restore@v4
        with:
          path: dxc-install
          key: dxc-${{ env.DXC_TAG }}-macos-arm64
      - name: build dxc
        if: steps.dxc-cache.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch "$DXC_TAG" --recurse-submodules --shallow-submodules \
            https://github.com/microsoft/DirectXShaderCompiler dxc-src
          cmake -B dxc-build -G Ninja dxc-src \
            -C dxc-src/cmake/caches/PredefinedParams.cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DENABLE_SPIRV_CODEGEN=ON \
            -DSPIRV_BUILD_TESTS=OFF \
            -DLLVM_ENABLE_ASSERTIONS=OFF \
            -DHLSL_DISABLE_SOURCE_GENERATION=ON
          cmake --build dxc-build --target dxc
          mkdir -p dxc-install/bin dxc-install/lib
          cp dxc-build/bin/dxc dxc-install/bin/
          cp dxc-build/lib/libdxcompiler.dylib dxc-install/lib/
      # Save right after the build so dxc is cached even when a later step (the
      # engine build) fails; actions/cache otherwise only saves on job success.
      - name: dxc cache save
        if: steps.dxc-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: dxc-install
          key: dxc-${{ env.DXC_TAG }}-macos-arm64
      - name: install dxc
        run: |
          chmod +x dxc-install/bin/dxc
          echo "$GITHUB_WORKSPACE/dxc-install/bin" >> "$GITHUB_PATH"
          echo "DYLD_FALLBACK_LIBRARY_PATH=$GITHUB_WORKSPACE/dxc-install/lib:$DYLD_FALLBACK_LIBRARY_PATH" >> "$GITHUB_ENV"
      - name: third-party deps
        run: |
          bash tools/get_nanobuf.sh
          bash tools/get_jolt.sh
      - name: configure
        run: >
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DRECREATION_FETCH_SDL3=ON
          -DCMAKE_PREFIX_PATH=$(brew --prefix)
          -DRECREATION_ZETANET_DIR=${{ github.workspace }}/zetanet
          -DRECREATION_LIBULTRAGUI_DIR=${{ github.workspace }}/libultragui
      - name: build
        run: cmake --build build
      - uses: actions/upload-artifact@v4
        with:
          name: recreation-macos-arm64
          path: |
            build/runtime/recreation
            build/tools/esminfo/esminfo

  android:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: zetanet
        uses: actions/checkout@v4
        with:
          repository: Force67/zetanet
          ref: develop
          path: zetanet
          submodules: recursive
      - name: deps
        run: |
          scripts/setup-linux.sh --system --minimal
          scripts/setup-linux.sh --dxc
      - name: nanobuf
        run: bash tools/get_nanobuf.sh
      - name: configure
        run: >
          cmake -B build-android -G Ninja
          -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_LATEST_HOME/build/cmake/android.toolchain.cmake
          -DANDROID_ABI=arm64-v8a -DANDROID_PLATFORM=android-29
          -DCMAKE_BUILD_TYPE=Release -DRECREATION_BUILD_TOOLS=OFF
          -DRECREATION_ZETANET_DIR=${{ github.workspace }}/zetanet
      - name: build
        run: cmake --build build-android
      - uses: actions/upload-artifact@v4
        with:
          name: recreation-android-arm64
          path: build-android/runtime/recreation
