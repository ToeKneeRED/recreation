name: build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: zetanet
        uses: actions/checkout@v4
        with:
          repository: Force67/zetanet
          ref: develop
          path: zetanet
          submodules: recursive
      - name: libultragui
        uses: actions/checkout@v4
        with:
          repository: Force67/libultragui
          path: libultragui
          submodules: recursive
      - name: deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build zlib1g-dev glslang-tools \
            libwayland-dev wayland-protocols libxkbcommon-dev libdecor-0-dev \
            libx11-dev libxext-dev libxrandr-dev libxcursor-dev libxi-dev \
            libxfixes-dev libgl-dev libegl-dev libdrm-dev libgbm-dev
      - name: dxc
        run: |
          curl -fsSL https://github.com/microsoft/DirectXShaderCompiler/releases/download/v1.9.2602.24/linux_dxc_2026_05_26.x86_64.tar.gz \
            | sudo tar -xz -C /usr/local
          sudo chmod +x /usr/local/bin/dxc
          sudo ldconfig
      - name: third-party deps
        run: |
          bash tools/get_fidelityfx.sh
          bash tools/get_dlss.sh
          bash tools/get_nrd.sh
          bash tools/get_jolt.sh
      - name: configure
        run: >
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DRECREATION_FETCH_SDL3=ON
          -DRECREATION_ZETANET_DIR=${{ github.workspace }}/zetanet
          -DRECREATION_LIBULTRAGUI_DIR=${{ github.workspace }}/libultragui
      - name: build
        run: cmake --build build
      - uses: actions/upload-artifact@v4
        with:
          name: recreation-linux-x64
          path: |
            build/runtime/recreation
            build/tools/esminfo/esminfo

  windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - name: zetanet
        uses: actions/checkout@v4
        with:
          repository: Force67/zetanet
          ref: develop
          path: zetanet
          submodules: recursive
      - name: libultragui
        uses: actions/checkout@v4
        with:
          repository: Force67/libultragui
          path: libultragui
          submodules: recursive
      - name: dxc
        run: |
          curl.exe -fsSL -o dxc.zip https://github.com/microsoft/DirectXShaderCompiler/releases/download/v1.9.2602.24/dxc_2026_05_27.zip
          Expand-Archive dxc.zip -DestinationPath $env:GITHUB_WORKSPACE\dxc
          Add-Content -Path $env:GITHUB_PATH -Value "$env:GITHUB_WORKSPACE\dxc\bin\x64"
      - name: third-party deps
        shell: bash
        run: |
          bash tools/get_fidelityfx.sh
          bash tools/get_nrd.sh
          bash tools/get_jolt.sh
      - name: configure
        run: >
          cmake -B build -DRECREATION_FETCH_SDL3=ON
          -DRECREATION_ZETANET_DIR=${{ github.workspace }}/zetanet
          -DRECREATION_LIBULTRAGUI_DIR=${{ github.workspace }}/libultragui
          -DRECREATION_DLSS=OFF
      - name: build
        run: cmake --build build --config Release
      - uses: actions/upload-artifact@v4
        with:
          name: recreation-windows-x64
          path: |
            build/runtime/Release/recreation.exe
            build/tools/esminfo/Release/esminfo.exe

  android:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: zetanet
        uses: actions/checkout@v4
        with:
          repository: Force67/zetanet
          ref: develop
          path: zetanet
          submodules: recursive
      - name: deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build
      - name: dxc
        run: |
          curl -fsSL https://github.com/microsoft/DirectXShaderCompiler/releases/download/v1.9.2602.24/linux_dxc_2026_05_26.x86_64.tar.gz \
            | sudo tar -xz -C /usr/local
          sudo chmod +x /usr/local/bin/dxc
          sudo ldconfig
      - name: configure
        run: >
          cmake -B build-android -G Ninja
          -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_LATEST_HOME/build/cmake/android.toolchain.cmake
          -DANDROID_ABI=arm64-v8a -DANDROID_PLATFORM=android-29
          -DCMAKE_BUILD_TYPE=Release -DRECREATION_BUILD_TOOLS=OFF
          -DRECREATION_ZETANET_DIR=${{ github.workspace }}/zetanet
      - name: build
        run: cmake --build build-android
      - uses: actions/upload-artifact@v4
        with:
          name: recreation-android-arm64
          path: build-android/runtime/recreation
