# Steam Deck: RDNA2 handheld with ray query but a tiny power budget. Cheap
# hybrid RT (shadows + AO + DDGI), FSR3 performance, RT reflections off.

[antialiasing]
aa_mode = upscaler
upscaler = fsr3
upscaler_quality = performance
sharpness = 0.3
taa_history_blend = 0.9

[shadows]
rt_shadows = true
sun_angular_radius = 0.0043633
shadow_maps = false
shadow_resolution = 2048
shadow_distance = 140.0

[geometry]
gpu_culling = true
gpu_occlusion = true
distance_lod = true
mesh_shader_lod = false
vsync = true

[sky]
sky = true
ibl = true
ibl_intensity = 1.0
aerial_perspective = 1.0
clouds = false
cloud_coverage = 0.46

[ambient_occlusion]
rtao = true
ssao = true
ao_radius = 1.2
ao_intensity = 1.0
ao_rays = 1

[global_illumination]
ddgi = true
ddgi_spacing = 2.5
ddgi_intensity = 1.0
ssgi = true

[reflections]
rt_reflections = false
reflection_roughness_cutoff = 0.4
water_reflections = false
ssr = true

[path_tracing]
path_trace = false
path_trace_reference = false
path_trace_spp = 2
path_trace_accum = 16
path_trace_recon = false
path_trace_recon_weight = 0.05
path_trace_recon_atrous = 4

[fog]
fog = false
fog_density = 0.03
fog_height_falloff = 0.15
fog_base_height = 0.0
fog_anisotropy = 0.6

[post]
bloom = true
bloom_intensity = 0.04
auto_exposure = true
adaptation_speed = 3.0
exposure = 1.0
tonemap = aces
