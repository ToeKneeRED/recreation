# PC high: high-end RT desktop (RTX 4070 / 4080). Denser DDGI, sharper RT
# reflections, 4K shadow cascades, longer shadow distance.

[antialiasing]
aa_mode = upscaler
upscaler = dlss
upscaler_quality = quality
sharpness = 0.15
taa_history_blend = 0.9

[shadows]
rt_shadows = true
sun_angular_radius = 0.0087266
shadow_maps = false
shadow_resolution = 4096
shadow_distance = 200.0

[geometry]
gpu_culling = true
gpu_occlusion = true
distance_lod = false
mesh_shader_lod = false
vsync = false

[sky]
sky = true
ibl = true
ibl_intensity = 1.0
aerial_perspective = 1.0
clouds = true
cloud_coverage = 0.46

[ambient_occlusion]
rtao = true
ssao = true
ao_radius = 1.2
ao_intensity = 1.0
ao_rays = 4

[global_illumination]
ddgi = true
ddgi_spacing = 1.0
ddgi_intensity = 1.0
ssgi = true

[reflections]
rt_reflections = true
reflection_roughness_cutoff = 0.6
water_reflections = true
ssr = true

[path_tracing]
path_trace = false
path_trace_reference = false
path_trace_spp = 2
path_trace_accum = 16
path_trace_recon = false
path_trace_recon_weight = 0.05
path_trace_recon_atrous = 4

[fog]
fog = false
fog_density = 0.03
fog_height_falloff = 0.15
fog_base_height = 0.0
fog_anisotropy = 0.6

[post]
bloom = true
bloom_intensity = 0.04
auto_exposure = true
adaptation_speed = 3.0
exposure = 1.0
tonemap = aces
